<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Topgony — Work</title>
<link rel="stylesheet" href="site.css"/>
<style>
#hd + .fb { margin-top: 64px; }
.vt { display:flex; border:1px solid var(--border); }
.vt button { padding:8px 12px; background:transparent; border:0; font-family:var(--font-mono); font-size:10px; letter-spacing:var(--ls-meta); text-transform:uppercase; color:var(--text-muted); cursor:pointer; }
.vt button.is-active { background:var(--text); color:#000; }
body[data-v="grid"] #list { display:none; }
body[data-v="list"] #grid { display:none; }
.yd { padding:48px var(--side-pad) 16px; display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--border); font-family:var(--font-mono); font-size:11px; letter-spacing:var(--ls-meta); text-transform:uppercase; color:var(--text-dim); }
.yd strong { font-family:var(--font-display); font-size:48px; font-weight:500; letter-spacing:-0.03em; color:var(--text); }
</style></head><body data-v="grid">
<div id="hd"></div>

<div class="fb">
  <div id="chipsWrap"></div>
  <div class="vt">
    <button class="is-active" data-v="grid">GRID</button>
    <button data-v="list">LIST</button>
  </div>
</div>

<div id="grid" class="mg"></div>
<div id="list"></div>

<div id="ft"></div>

<script src="i18n.js"></script><script src="data.js"></script><script src="components.js"></script>
<script>
document.getElementById('hd').innerHTML = tplHeader('work');
document.getElementById('ft').innerHTML = tplFooter();
document.getElementById('chipsWrap').innerHTML = tplChips('all');
document.getElementById('grid').innerHTML = TG.works.map(tplCard).join('');
bindVideos();

const years = [...new Set(TG.works.map(w => w.year))].sort((a,b) => b-a);
document.getElementById('list').innerHTML = years.map(y => {
  const items = TG.works.filter(w => w.year === y).sort((a,b) => b.month - a.month);
  return `<div class="yd"><strong>${y}</strong><span>${items.length} FILMS</span></div>` + items.map(tplIdx).join('');
}).join('');

bindFilter();
document.querySelectorAll('.vt button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.vt button').forEach(x => x.classList.remove('is-active'));
  b.classList.add('is-active');
  document.body.dataset.v = b.dataset.v;
}));
</script>
</body></html>
